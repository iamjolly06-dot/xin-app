<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XỊN — Đồ Mỹ Chính Hãng</title>

    <!-- PWA: makes the app installable to a phone home screen -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#14171F" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js");
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!--
      Tawk.to live chat widget.
      Replace YOUR_PROPERTY_ID / YOUR_WIDGET_ID with the values from your
      Tawk.to dashboard (Administration -> Chat Widget -> Widget Code).
      See Step 5 of README.md.
    -->
    <script type="text/javascript">
      var Tawk_API = Tawk_API || {},
        Tawk_LoadStart = new Date();
      (function () {
        var s1 = document.createElement("script"),
          s0 = document.getElementsByTagName("script")[0];
        s1.async = true;
        s1.src = "https://embed.tawk.to/YOUR_PROPERTY_ID/YOUR_WIDGET_ID";
        s1.charset = "UTF-8";
        s1.setAttribute("crossorigin", "*");
        s0.parentNode.insertBefore(s1, s0);
      })();
    </script>
  </body>
</html>
